# Builds dukes_ai_native for Windows, macOS, Linux, and Android
# Triggered on push/PR to main, or manually via workflow_dispatch.
# Artifacts are uploaded and retained for 14 days.

name: Build Native AI

on:
  push:
    branches: [ main ]
    paths:
      - 'duke-s-gambit/native/dukes_ai/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'duke-s-gambit/native/dukes_ai/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
            arch: arm64
          - platform: linux
            os: ubuntu-latest
          - platform: android
            os: ubuntu-latest
            arch: arm64
          - platform: android
            os: ubuntu-latest
            arch: arm32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: pip install scons

      - name: Install build dependencies (Linux / Android)
        if: matrix.platform == 'linux' || matrix.platform == 'android'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config

      - name: Install Android NDK
        if: matrix.platform == 'android'
        run: echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;28.1.13356709"

      - name: Build dukes_ai_native
        working-directory: duke-s-gambit/native/dukes_ai
        run: scons platform=${{ matrix.platform }} target=template_release ${{ matrix.arch && format('arch={0}', matrix.arch) || '' }} -j4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dukes_ai_native-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: duke-s-gambit/native/dukes_ai/bin/*
          retention-days: 14
