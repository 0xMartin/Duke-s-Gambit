# GitHub Actions CI – smoke test only
# Native binaries are built locally and committed to the repo.
# CI just verifies the project imports and exports for Linux without errors.

name: Smoke Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Godot Smoke Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.2-stable_linux.x86_64 /usr/local/bin/godot
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          unzip -q Godot_v4.6.2-stable_export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.6.2.stable/

      - name: Import project assets
        run: |
          godot --headless --path duke-s-gambit --import

      - name: Export Linux build
        run: |
          mkdir -p export
          godot --headless --path duke-s-gambit --export-release "Linux/X11" ../export/game-linux.x86_64

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: game-linux
          path: export/game-linux.x86_64
          retention-days: 7
