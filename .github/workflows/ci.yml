# GitHub Actions CI for Godot C++ GDExtension (dukes_ai)
# Builds dukes_ai_native for Windows, macOS, Linux, and Android
# Exports Godot project with correct native library for each platform

name: Build & Export Native AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-godot:
    name: Export Godot Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Export for all platforms
        run: |
          mkdir -p export
          godot --headless --export-release "Windows Desktop" export/game-windows.exe
          godot --headless --export-release "Linux/X11" export/game-linux.x86_64
          godot --headless --export-release "macOS" export/game-macos.zip
          godot --headless --export-release "Android" export/game-android.apk

      - name: Upload exported builds
        uses: actions/upload-artifact@v4
        with:
          name: exported-builds
          path: export/
          retention-days: 14
